services:
  # 前端服务（内置 nginx，应用层，经常重建）
  ruoyi-frontend:
    build:
      context: ./ruoyi-fastapi-frontend
      dockerfile: Dockerfile
    image: ruoyi-frontend:latest
    container_name: ruoyi-frontend
    restart: unless-stopped
    ports:
      - "12580:80"
    volumes:
      - ./ruoyi-fastapi-frontend/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ruoyi-backend-pg
    networks:
      - ruoyi-network

  # 后端服务（PostgreSQL版本，应用层，经常重建）
  ruoyi-backend-pg:
    build:
      context: ./ruoyi-fastapi-backend
      dockerfile: Dockerfile.pg
    image: ruoyi-backend-pg:latest
    container_name: ruoyi-backend-pg
    restart: unless-stopped
    ports:
      - "19099:9099"
    depends_on:
      ruoyi-pg:
        condition: service_healthy
      ruoyi-redis:
        condition: service_healthy
    networks:
      - ruoyi-network

  # PostgreSQL服务（有状态，数据持久化到命名卷，无需每次重建）
  ruoyi-pg:
    image: postgres:14
    container_name: ruoyi-pg
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ruoyi-fastapi
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15432:5432"
    volumes:
      # 初始化 SQL 仅在数据卷为空（首次启动）时执行一次
      - ./ruoyi-fastapi-backend/sql/ruoyi-fastapi-pg.sql:/docker-entrypoint-initdb.d/ruoyi-fastapi-pg.sql
      # 数据持久化：down / 重建后数据不丢失
      - ruoyi-pg-data:/var/lib/postgresql/data
    networks:
      - ruoyi-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务（有状态，开启 AOF 持久化并写入命名卷）
  ruoyi-redis:
    image: redis:latest
    container_name: ruoyi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - ruoyi-redis-data:/data
    networks:
      - ruoyi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  ruoyi-network:
    name: ruoyi-network
    driver: bridge

# 数据卷：postgres / redis 数据独立于容器生命周期，重建应用时不受影响
volumes:
  ruoyi-pg-data:
    name: ruoyi-pg-data
  ruoyi-redis-data:
    name: ruoyi-redis-data